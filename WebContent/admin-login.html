<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - Smart Parking System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="logo">SmartParking</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="slots.jsp">Slots</a>
      <a href="booking.html">Book Now</a>
      <a href="admin-login.html">Admin</a>
    </nav>
  </header>

  <!-- Login Section -->
  <section class="login-section">
    <div class="login-box">
      <h2>Admin Login</h2>
      <p>Enter your username and password to access the dashboard.</p>

      <form action="adminLogin" method="post">
        <div class="input-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter username" required />
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter password" required />
        </div>

        <button type="submit" class="login-btn">Login</button>
      </form>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <p>Smart Parking System © 2026 | Admin Panel</p>
  </footer>

</body>
</html>
